<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d9488" />
  <title>프로젝트 | 개인카드 PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="page-header">
      <nav class="page-nav">
        <a class="nav-link" href="index.html">홈</a>
        <a class="nav-link" href="customer.html">고객관리</a>
        <a class="nav-link" href="rental.html">임대관리</a>
        <a class="nav-link current" href="project.html">프로젝트</a>
        <a class="nav-link" href="tdl.html">TDL</a>
        <a class="nav-link" href="schedule.html">약속관리</a>
        <a class="nav-link" href="anniv.html">기념일</a>
        <a class="nav-link" href="settings.html">설정</a>
      </nav>
      <div class="page-title-row">
        <div>
          <h1 class="page-title">프로젝트</h1>
          <p class="page-desc">프로젝트별 구상과 아이디어를 기록합니다.</p>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- 프로젝트 목록 -->
      <div id="projectListView">
        <section class="panel">
          <div class="panel-header">
            <h2>프로젝트 목록</h2>
            <button type="button" id="showAddProjectBtn" class="primary-action toolbar-button">+ 새 프로젝트</button>
          </div>

          <div id="addProjectForm" class="project-add-form" hidden>
            <input type="text" id="newProjectName" placeholder="프로젝트 이름" maxlength="50"
              lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
            <div class="form-actions" style="margin-top:8px">
              <button type="button" id="saveProjectBtn">추가</button>
              <button type="button" id="cancelProjectBtn" class="secondary-button">취소</button>
            </div>
          </div>

          <div id="projectList" class="project-list"></div>
        </section>
      </div>

      <!-- 프로젝트 상세 -->
      <div id="projectDetailView" hidden>
        <section class="panel">
          <div class="panel-header">
            <h2 id="projectDetailTitle" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></h2>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button type="button" id="btnRenameProject" class="secondary-button toolbar-button">수정</button>
              <button type="button" id="deleteProjectBtn" class="danger-button toolbar-button">삭제</button>
              <button type="button" id="backToProjectListBtn" class="secondary-button toolbar-button">← 목록</button>
            </div>
          </div>
          <div id="renameProjectForm" hidden style="display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem">
            <input type="text" id="renameProjectInput" maxlength="80" placeholder="새 프로젝트명"
              lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"
              style="flex:1" />
            <button type="button" id="btnSaveRenameProject" class="toolbar-button">저장</button>
            <button type="button" id="btnCancelRenameProject" class="secondary-button toolbar-button">취소</button>
          </div>

          <!-- 하위 탭 -->
          <nav class="sub-tab-nav" id="projectSubTabNav">
            <button type="button" class="sub-tab active" data-tab="idea">구상내용</button>
            <button type="button" class="sub-tab" data-tab="progress">진행상황</button>
            <button type="button" class="sub-tab" data-tab="ref">참고자료</button>
          </nav>

          <!-- 구상내용 탭 -->
          <div id="projectTab-idea" class="sub-tab-content">
            <div id="projectNotesList" class="project-notes-list"></div>
            <div class="project-note-editor" style="margin-top:12px">
              <textarea id="projectNoteInput" placeholder="구상 내용을 입력하세요" rows="4"
                lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
              <div class="detail-action-row">
                <button type="button" id="addProjectNoteBtn">추가</button>
              </div>
            </div>
          </div>

          <!-- 진행상황 탭 -->
          <div id="projectTab-progress" class="sub-tab-content" hidden>
            <div id="projectProgressList" class="project-notes-list"></div>
            <div class="project-note-editor" style="margin-top:12px">
              <textarea id="projectProgressInput" placeholder="진행 상황을 입력하세요" rows="3"
                lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
              <div class="detail-action-row">
                <button type="button" id="addProgressBtn">추가</button>
              </div>
            </div>
          </div>

          <!-- 참고자료 탭 -->
          <div id="projectTab-ref" class="sub-tab-content" hidden>
            <div id="projectRefList" class="project-notes-list"></div>
            <div class="project-note-editor" style="margin-top:12px">
              <textarea id="projectRefInput" placeholder="참고자료, 링크, 메모 등을 입력하세요" rows="3"
                lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
              <div class="detail-action-row">
                <button type="button" id="addRefBtn">추가</button>
              </div>
            </div>
          </div>

        </section>
      </div>
    </main>
  </div>

  <script src="common.js"></script>
  <script>
  (function () {
    const STORAGE_KEY = "projects_v1";

    function loadProjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch { return []; }
    }
    function saveProjects(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function formatNow() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }
    function escHtml(v) {
      return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }

    let projects = loadProjects();
    let currentProjectId = null;
    let activeTab = "idea";
    let editingNote = null; // { field, idx } | null

    // ── 목록 렌더 ──
    function renderProjectList() {
      const el = document.getElementById("projectList");
      if (!el) return;
      if (projects.length === 0) {
        el.innerHTML = `<p class="empty">프로젝트가 없습니다. 새 프로젝트를 추가해보세요.</p>`;
        return;
      }
      el.innerHTML = "";
      projects.slice().reverse().forEach((proj) => {
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `<button type="button" class="project-name-btn">${escHtml(proj.name)}</button>`;
        card.querySelector(".project-name-btn").addEventListener("click", () => openProject(proj.id));
        el.appendChild(card);
      });
    }

    // ── 탭 전환 ──
    function switchTab(tab) {
      activeTab = tab;
      editingNote = null;
      document.querySelectorAll("#projectSubTabNav .sub-tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      ["idea","progress","ref"].forEach(t => {
        document.getElementById(`projectTab-${t}`).hidden = (t !== tab);
      });
      const proj = projects.find(p => p.id === currentProjectId);
      if (proj) renderTabNotes(tab, proj);
    }

    // ── 탭별 노트 렌더 ──
    function renderTabNotes(tab, proj) {
      const fieldMap = { idea: "notes", progress: "progress", ref: "ref" };
      const elIdMap  = { idea: "projectNotesList", progress: "projectProgressList", ref: "projectRefList" };
      const field = fieldMap[tab];
      const el = document.getElementById(elIdMap[tab]);
      if (!el) return;
      const notes = proj[field] || [];
      if (notes.length === 0) {
        el.innerHTML = `<p class="empty">아직 내용이 없습니다.</p>`;
        return;
      }
      el.innerHTML = notes.slice().reverse().map((note, ri) => {
        const realIdx = notes.length - 1 - ri;
        if (editingNote && editingNote.field === field && editingNote.idx === realIdx) {
          return `<div style="padding:.35rem 0">
            <textarea class="note-edit-textarea" rows="4" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"
              style="width:100%;font-size:.9rem;padding:.55rem .75rem;border:1.5px solid var(--brand);border-radius:.5rem;font-family:inherit;box-sizing:border-box;resize:vertical"
            >${escHtml(note.content)}</textarea>
            <div style="display:flex;gap:.4rem;margin-top:.3rem">
              <button type="button" class="note-edit-save mini-button" data-idx="${realIdx}" data-field="${field}">저장</button>
              <button type="button" class="note-edit-cancel mini-button" style="background:var(--bg);color:var(--text-light);border-color:var(--border)">취소</button>
              <button type="button" class="mini-button danger-mini" data-del="${realIdx}" data-field="${field}" style="margin-left:auto">삭제</button>
            </div>
          </div>`;
        }
        return `<div class="note-click-item" data-idx="${realIdx}" data-field="${field}"
          style="padding:.45rem .3rem;font-size:.9rem;line-height:1.7;word-break:break-all;cursor:text;border-radius:.4rem;transition:background .15s"
          title="클릭하여 수정">${escHtml(note.content).replace(/\n/g,"<br>")}</div>`;
      }).join("");

      // 클릭하면 바로 편집
      el.querySelectorAll(".note-click-item").forEach(div => {
        div.addEventListener("click", () => {
          editingNote = { field: div.dataset.field, idx: Number(div.dataset.idx) };
          renderTabNotes(tab, proj);
          // textarea에 포커스 + 커서를 끝으로
          const ta = el.querySelector(".note-edit-textarea");
          if (ta) { ta.focus(); ta.selectionStart = ta.selectionEnd = ta.value.length; }
        });
      });
      el.querySelector(".note-edit-cancel")?.addEventListener("click", () => {
        editingNote = null;
        renderTabNotes(tab, proj);
      });
      el.querySelector(".note-edit-save")?.addEventListener("click", (e) => {
        const idx = Number(e.target.dataset.idx);
        const f   = e.target.dataset.field;
        const newContent = el.querySelector(".note-edit-textarea").value.trim();
        if (!newContent) { alert("내용을 입력하세요."); return; }
        const p = projects.find(p => p.id === currentProjectId);
        if (!p) return;
        p[f][idx].content = newContent;
        saveProjects(projects);
        editingNote = null;
        renderTabNotes(tab, p);
      });
      // Ctrl+Enter 로도 저장
      el.querySelector(".note-edit-textarea")?.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          el.querySelector(".note-edit-save")?.click();
        }
        if (e.key === "Escape") {
          editingNote = null;
          renderTabNotes(tab, proj);
        }
      });
      el.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const idx = Number(btn.dataset.del);
          const f = btn.dataset.field;
          const p = projects.find(p => p.id === currentProjectId);
          if (!p || !confirm("이 내용을 삭제할까요?")) return;
          p[f].splice(idx, 1);
          saveProjects(projects);
          editingNote = null;
          renderTabNotes(tab, p);
        });
      });
    }

    // ── 상세 열기 ──
    function openProject(id) {
      currentProjectId = id;
      const proj = projects.find(p => p.id === id);
      if (!proj) return;
      document.getElementById("projectListView").hidden = true;
      document.getElementById("projectDetailView").hidden = false;
      document.getElementById("projectDetailTitle").textContent = proj.name;
      switchTab("idea");
    }

    function addNote(tab) {
      const inputIdMap = { idea: "projectNoteInput", progress: "projectProgressInput", ref: "projectRefInput" };
      const fieldMap   = { idea: "notes", progress: "progress", ref: "ref" };
      const content = document.getElementById(inputIdMap[tab]).value.trim();
      if (!content) return;
      const proj = projects.find(p => p.id === currentProjectId);
      if (!proj) return;
      if (!Array.isArray(proj[fieldMap[tab]])) proj[fieldMap[tab]] = [];
      proj[fieldMap[tab]].push({ date: formatNow(), content });
      saveProjects(projects);
      document.getElementById(inputIdMap[tab]).value = "";
      renderTabNotes(tab, proj);
    }

    // ── 이벤트 바인딩 ──
    document.getElementById("showAddProjectBtn").addEventListener("click", () => {
      const form = document.getElementById("addProjectForm");
      form.hidden = !form.hidden;
      if (!form.hidden) document.getElementById("newProjectName").focus();
    });

    document.getElementById("cancelProjectBtn").addEventListener("click", () => {
      document.getElementById("addProjectForm").hidden = true;
      document.getElementById("newProjectName").value = "";
    });

    document.getElementById("saveProjectBtn").addEventListener("click", () => {
      const name = document.getElementById("newProjectName").value.trim();
      if (!name) { alert("프로젝트 이름을 입력하세요."); return; }
      if (projects.some(p => p.name === name)) { alert("같은 이름의 프로젝트가 이미 있습니다."); return; }
      projects.push({ id: String(Date.now()), name, notes: [], progress: [], ref: [], createdAt: formatNow() });
      saveProjects(projects);
      document.getElementById("newProjectName").value = "";
      document.getElementById("addProjectForm").hidden = true;
      renderProjectList();
    });

    document.getElementById("newProjectName").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("saveProjectBtn").click();
    });

    document.getElementById("backToProjectListBtn").addEventListener("click", () => {
      document.getElementById("projectDetailView").hidden = true;
      document.getElementById("projectListView").hidden = false;
      document.getElementById("renameProjectForm").hidden = true;
      currentProjectId = null;
      renderProjectList();
    });

    document.getElementById("deleteProjectBtn").addEventListener("click", () => {
      const proj = projects.find(p => p.id === currentProjectId);
      if (!proj) return;
      if (!confirm(`"${proj.name}" 프로젝트를 삭제할까요?`)) return;
      projects = projects.filter(p => p.id !== currentProjectId);
      saveProjects(projects);
      document.getElementById("backToProjectListBtn").click();
    });

    document.getElementById("btnRenameProject").addEventListener("click", () => {
      const f = document.getElementById("renameProjectForm");
      f.hidden = !f.hidden;
      if (!f.hidden) {
        const proj = projects.find(p => p.id === currentProjectId);
        document.getElementById("renameProjectInput").value = proj?.name || "";
        document.getElementById("renameProjectInput").focus();
      }
    });
    document.getElementById("btnCancelRenameProject").addEventListener("click", () => {
      document.getElementById("renameProjectForm").hidden = true;
    });
    document.getElementById("btnSaveRenameProject").addEventListener("click", () => {
      const name = document.getElementById("renameProjectInput").value.trim();
      if (!name) { alert("프로젝트명을 입력하세요."); return; }
      const proj = projects.find(p => p.id === currentProjectId);
      if (!proj) return;
      proj.name = name;
      saveProjects(projects);
      document.getElementById("projectDetailTitle").textContent = name;
      document.getElementById("renameProjectForm").hidden = true;
      renderProjectList();
    });
    document.getElementById("renameProjectInput").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btnSaveRenameProject").click();
    });

    document.getElementById("projectSubTabNav").addEventListener("click", e => {
      const tab = e.target.closest(".sub-tab")?.dataset.tab;
      if (tab) switchTab(tab);
    });

    document.getElementById("addProjectNoteBtn").addEventListener("click", () => addNote("idea"));
    document.getElementById("addProgressBtn").addEventListener("click",    () => addNote("progress"));
    document.getElementById("addRefBtn").addEventListener("click",         () => addNote("ref"));

    ["projectNoteInput","projectProgressInput","projectRefInput"].forEach((id, i) => {
      const tabMap = ["idea","progress","ref"];
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addNote(tabMap[i]); }
      });
    });

    renderProjectList();
  })();
  </script>
</body>
</html>
