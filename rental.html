<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d9488" />
  <title>임대관리 | 개인카드 PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="page-header">
      <nav class="page-nav">
        <a class="nav-link" href="index.html">홈</a>
        <a class="nav-link" href="customer.html">고객관리</a>
        <a class="nav-link current" href="rental.html">임대관리</a>
        <a class="nav-link" href="project.html">프로젝트</a>
        <a class="nav-link" href="tdl.html">TDL</a>
        <a class="nav-link" href="schedule.html">약속관리</a>
        <a class="nav-link" href="anniv.html">기념일</a>
        <a class="nav-link" href="settings.html">설정</a>
      </nav>
      <div class="page-title-row">
        <div>
          <h1 class="page-title">임대관리</h1>
          <p class="page-desc" id="breadcrumb">임대 물건과 호실을 관리합니다.</p>
        </div>
      </div>
    </header>

    <main class="container">

      <!-- ══ View 1: 물건 목록 ══ -->
      <div id="vProps">
        <section class="panel">
          <div class="panel-header">
            <h2>임대 물건 목록</h2>
            <button type="button" id="btnShowAddProp" class="toolbar-button">+ 물건 추가</button>
          </div>
          <div id="addPropForm" class="project-add-form" hidden style="flex-direction:column">
            <input type="text" id="newPropName" placeholder="물건명 (예: 조용한집1)" maxlength="60"
              lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
            <select id="newPropType">
              <option value="">유형 선택</option>
              <option>다가구주택</option>
              <option>다세대주택</option>
              <option>아파트</option>
              <option>오피스텔</option>
              <option>빌라/연립</option>
              <option>단독주택</option>
              <option>상가</option>
              <option>사무실</option>
              <option>기타</option>
            </select>
            <input type="text" id="newPropAddress" placeholder="주소 (선택)" maxlength="100"
              lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
            <div class="form-actions" style="margin-top:8px">
              <button type="button" id="btnSaveProp">추가</button>
              <button type="button" id="btnCancelProp" class="secondary-button">취소</button>
            </div>
          </div>
          <div id="propList" class="project-list"></div>
        </section>
      </div>

      <!-- ══ View 2: 호실 목록 ══ -->
      <div id="vRooms" hidden>
        <section class="panel">
          <div class="panel-header">
            <h2 id="propTitle"></h2>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <button type="button" id="btnShowAddRoom" class="toolbar-button">+ 호실 추가</button>
              <button type="button" id="btnEditProp" class="secondary-button toolbar-button">물건수정</button>
              <button type="button" id="btnDelProp" class="danger-button toolbar-button">삭제</button>
              <button type="button" id="btnBackToProps" class="secondary-button toolbar-button">← 목록</button>
            </div>
          </div>
          <!-- 물건 수정 폼 -->
          <div id="editPropForm" hidden style="background:var(--bg);border-radius:.65rem;padding:.8rem;margin-bottom:.8rem;border:1.5px solid var(--border)">
            <div class="rental-info-form">
              <div class="rental-field">
                <label>물건명</label>
                <input type="text" id="editPropName" maxlength="60" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
              </div>
              <div class="rental-field">
                <label>유형</label>
                <select id="editPropType">
                  <option value="">유형 선택</option>
                  <option>다가구주택</option>
                  <option>다세대주택</option>
                  <option>아파트</option>
                  <option>오피스텔</option>
                  <option>빌라/연립</option>
                  <option>단독주택</option>
                  <option>상가</option>
                  <option>사무실</option>
                  <option>기타</option>
                </select>
              </div>
              <div class="rental-field">
                <label>주소</label>
                <input type="text" id="editPropAddress" maxlength="100" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
              </div>
            </div>
            <div class="form-actions" style="margin-top:8px">
              <button type="button" id="btnSaveEditProp">저장</button>
              <button type="button" id="btnCancelEditProp" class="secondary-button">취소</button>
            </div>
          </div>
          <p id="propMeta" class="help-text"></p>
          <div id="reportBox" class="report-summary"></div>
          <!-- 호실 추가 폼 -->
          <div id="addRoomForm" hidden style="background:var(--bg);border-radius:.65rem;padding:.8rem;margin-bottom:.8rem;border:1.5px solid var(--border)">
            <div class="rental-field">
              <label>호실명</label>
              <input type="text" id="newRoomName" placeholder="예: 101호, 202호" maxlength="30"
                lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
            </div>
            <div class="form-actions" style="margin-top:8px">
              <button type="button" id="btnSaveRoom">추가</button>
              <button type="button" id="btnCancelRoom" class="secondary-button">취소</button>
            </div>
          </div>
          <div id="roomGrid" class="room-grid"></div>
        </section>
      </div>

      <!-- ══ View 3: 호실 상세 ══ -->
      <div id="vRoomDetail" hidden>
        <section class="panel">
          <div class="panel-header">
            <h2 id="roomDetailTitle"></h2>
            <div style="display:flex;gap:6px">
              <button type="button" id="btnDelRoom" class="danger-button toolbar-button">호실삭제</button>
              <button type="button" id="btnBackToRooms" class="secondary-button toolbar-button">← 호실목록</button>
            </div>
          </div>

          <nav class="sub-tab-nav" id="roomTabNav">
            <button type="button" class="sub-tab active" data-tab="contract">계약정보</button>
            <button type="button" class="sub-tab" data-tab="payment">납부내역</button>
            <button type="button" class="sub-tab" data-tab="memo">메모</button>
          </nav>

          <!-- 계약정보 탭 -->
          <div id="rTab-contract" class="sub-tab-content">
            <div class="rental-info-form">
              <div class="rental-field">
                <label>계약 유형</label>
                <select id="rc-ctype">
                  <option value="">선택</option>
                  <option>월세</option>
                  <option>전세</option>
                  <option>반전세</option>
                  <option>공실</option>
                </select>
              </div>
              <div class="rental-field">
                <label>임차인명</label>
                <input type="text" id="rc-tenant" placeholder="홍길동"
                  lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
              </div>
              <div class="rental-field">
                <label>보증금</label>
                <input type="text" id="rc-deposit" placeholder="예: 3,000,000"
                  lang="ko" autocorrect="off" spellcheck="false" inputmode="numeric" />
              </div>
              <div class="rental-field">
                <label>월세</label>
                <input type="text" id="rc-monthly" placeholder="예: 500,000"
                  lang="ko" autocorrect="off" spellcheck="false" inputmode="numeric" />
              </div>
              <div class="rental-field">
                <label>매월 납부일</label>
                <input type="text" id="rc-dueday" placeholder="예: 매월 5일"
                  lang="ko" autocorrect="off" spellcheck="false" />
              </div>
              <div class="rental-field">
                <label>계약 시작</label>
                <input type="date" id="rc-start" />
              </div>
              <div class="rental-field">
                <label>계약 종료</label>
                <input type="date" id="rc-end" />
              </div>
              <div class="rental-field">
                <label>특이사항</label>
                <textarea id="rc-note" rows="3" placeholder="기타 계약 내용"
                  lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
              </div>
            </div>
            <!-- 임대료 변동 이력 -->
            <div style="margin:.6rem 0;border-top:1px solid var(--border);padding-top:.6rem">
              <div style="font-size:.88rem;font-weight:600;color:var(--brand-strong);margin-bottom:.4rem">임대료 변동 이력</div>
              <div id="rentHistoryList" style="margin-bottom:.5rem"></div>
              <div style="display:flex;flex-wrap:wrap;gap:.4rem;align-items:flex-end">
                <div style="flex:1;min-width:110px">
                  <label style="font-size:.78rem;color:var(--text-light);display:block;margin-bottom:.2rem">변동일</label>
                  <input type="date" id="rh-date" />
                </div>
                <div style="flex:1;min-width:90px">
                  <label style="font-size:.78rem;color:var(--text-light);display:block;margin-bottom:.2rem">새 월세</label>
                  <input type="text" id="rh-monthly" placeholder="예: 500,000" lang="ko" autocorrect="off" spellcheck="false" inputmode="numeric" />
                </div>
                <div style="flex:2;min-width:130px">
                  <label style="font-size:.78rem;color:var(--text-light);display:block;margin-bottom:.2rem">비고</label>
                  <input type="text" id="rh-note" placeholder="예: 재계약 인상" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
                </div>
                <button type="button" id="btnAddRentHistory" class="toolbar-button" style="flex-shrink:0;align-self:flex-end">추가</button>
              </div>
            </div>
            <div id="contractTerminatedBadge" hidden style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:.5rem;padding:.5rem .75rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:#dc2626;flex-wrap:wrap">
              <span>계약 종료됨 ·</span>
              <strong id="contractTerminatedDate"></strong>
              <button type="button" id="btnUndoTerminate" class="mini-button" style="margin-left:auto">종료취소</button>
            </div>
            <div class="detail-action-row" style="gap:8px;flex-wrap:wrap">
              <button type="button" id="btnSaveContract">저장</button>
              <button type="button" id="btnTerminateContract" class="toolbar-button" style="background:#fff;color:#ef4444;border:1.5px solid #ef4444">계약종료</button>
            </div>
          </div>

          <!-- 납부내역 탭 -->
          <div id="rTab-payment" class="sub-tab-content" hidden>
            <!-- 미납 요약 -->
            <div id="paymentSummary" class="report-summary" style="margin-bottom:.75rem"></div>
            <!-- 납부일 기록 -->
            <div class="payment-add-form">
              <div class="rental-field">
                <label>납부일</label>
                <input type="date" id="pay-date" />
              </div>
              <div class="rental-field" style="margin-top:.4rem">
                <label>메모 (선택)</label>
                <input type="text" id="pay-note" placeholder="예: 현금납부, 이체 등"
                  lang="ko" autocorrect="off" spellcheck="false" />
              </div>
              <div class="detail-action-row" style="margin-top:.5rem">
                <button type="button" id="btnAddPayment">납부 기록 추가</button>
              </div>
            </div>
            <!-- 월별 납부 목록 -->
            <div style="margin:.4rem 0">
              <button type="button" id="btnTogglePaymentList" class="secondary-button toolbar-button" style="width:100%">납부 목록 펼치기 ▼</button>
            </div>
            <div id="paymentList" class="payment-list" hidden></div>
          </div>

          <!-- 메모 탭 -->
          <div id="rTab-memo" class="sub-tab-content" hidden>
            <div id="roomMemoList" class="project-notes-list" style="margin-bottom:.8rem"></div>
            <textarea id="roomMemoInput" rows="3" placeholder="자유롭게 메모하세요"
              lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"
              style="width:100%;font-size:.9rem;padding:.55rem .75rem;border:1.5px solid var(--border);border-radius:.5rem;font-family:inherit;box-sizing:border-box;resize:vertical"></textarea>
            <div class="detail-action-row" style="margin-top:.4rem">
              <button type="button" id="btnAddRoomMemo">메모 추가</button>
            </div>
          </div>

        </section>
      </div>

    </main>
  </div>

  <script src="common.js"></script>
  <script>
  (function () {
    const KEY = "rentals_v1";

    function load() {
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch { return []; }
    }
    function save(data) { localStorage.setItem(KEY, JSON.stringify(data)); }

    function esc(v) {
      return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }
    function nowStr() {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function pad(n) { return String(n).padStart(2,"0"); }

    // 숫자 → 회계단위 (원)
    function toAccounting(raw) {
      if (!raw) return "";
      const s = String(raw).trim();
      // 구형식 호환: "500만원", "45만원" 등
      const mMan = s.replace(/,/g,"").match(/(\d+\.?\d*)\s*만원?/);
      if (mMan) {
        const n = parseFloat(mMan[1]) * 10000;
        return `${Math.round(n).toLocaleString("ko")}원`;
      }
      // 신형식: 3,000,000 또는 3000000원
      const noUnit = s.replace(/[,원\s]/g, "");
      const n = parseFloat(noUnit);
      if (!isNaN(n)) return `${Math.round(n).toLocaleString("ko")}원`;
      return s;
    }

    // 숫자 입력 자동 콤마
    function addCommaInput(el) {
      el.addEventListener("input", () => {
        const raw = el.value.replace(/[^0-9.]/g, "");
        if (!raw) return;
        const parts = raw.split(".");
        parts[0] = Number(parts[0]).toLocaleString("ko");
        el.value = parts.join(".");
      });
    }

    // YYYY-MM 목록 생성 (시작 ~ 오늘, 계약종료 시 종료일 기준)
    function genMonthList(startDate, terminatedDate) {
      if (!startDate) return [];
      const today = new Date(); today.setDate(1); today.setHours(0,0,0,0);
      const start = new Date(startDate); start.setDate(1);
      let until = today;
      if (terminatedDate) {
        const t = new Date(terminatedDate); t.setDate(1);
        if (t < today) until = t;
      }
      const list = [];
      const cur = new Date(start);
      while (cur <= until) {
        list.push(`${cur.getFullYear()}-${pad(cur.getMonth()+1)}`);
        cur.setMonth(cur.getMonth()+1);
      }
      return list;
    }

    // 구버전 마이그레이션
    let props = load().map(p => {
      if (!Array.isArray(p.rooms)) {
        p.type = p.info?.type || p.type || "";
        p.address = p.info?.address || p.address || "";
        p.rooms = [];
      }
      return p;
    });

    let curPropId = null;
    let curRoomId = null;

    function showView(v) {
      document.getElementById("vProps").hidden      = v !== "props";
      document.getElementById("vRooms").hidden      = v !== "rooms";
      document.getElementById("vRoomDetail").hidden = v !== "roomDetail";
    }

    // ── 물건 목록 ──
    function renderProps() {
      const el = document.getElementById("propList");
      if (!el) return;
      if (props.length === 0) {
        el.innerHTML = `<p class="empty">임대 물건이 없습니다. 위에서 추가해보세요.</p>`;
        return;
      }
      el.innerHTML = "";
      props.forEach(p => {
        const rooms = p.rooms || [];
        const occupied = rooms.filter(r => r.contract?.ctype && r.contract.ctype !== "공실" && r.contract.ctype !== "").length;
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `
          <button type="button" class="project-name-btn">
            ${esc(p.name)}
            <span style="font-size:.78rem;font-weight:400;color:var(--text-light)">
              ${p.type ? " · " + esc(p.type) : ""} · ${rooms.length}실 (입주 ${occupied})
            </span>
          </button>`;
        card.querySelector(".project-name-btn").addEventListener("click", () => openProp(p.id));
        el.appendChild(card);
      });
    }

    function openProp(id) {
      curPropId = id;
      const p = props.find(x => x.id === id);
      if (!p) return;
      document.getElementById("propTitle").textContent = p.name;
      document.getElementById("propMeta").textContent =
        [p.type, p.address].filter(Boolean).join(" · ") || "";
      document.getElementById("editPropForm").hidden = true;
      renderRoomGrid(p);
      renderReport(p);
      showView("rooms");
    }

    // ── 물건 수정 ──
    document.getElementById("btnEditProp").addEventListener("click", () => {
      const f = document.getElementById("editPropForm");
      f.hidden = !f.hidden;
      if (!f.hidden) {
        const p = props.find(x => x.id === curPropId);
        if (!p) return;
        document.getElementById("editPropName").value    = p.name    || "";
        document.getElementById("editPropType").value   = p.type    || "";
        document.getElementById("editPropAddress").value= p.address || "";
        document.getElementById("editPropName").focus();
      }
    });
    document.getElementById("btnCancelEditProp").addEventListener("click", () => {
      document.getElementById("editPropForm").hidden = true;
    });
    document.getElementById("btnSaveEditProp").addEventListener("click", () => {
      const name    = document.getElementById("editPropName").value.trim();
      const type    = document.getElementById("editPropType").value;
      const address = document.getElementById("editPropAddress").value.trim();
      if (!name) { alert("물건명을 입력하세요."); return; }
      const p = props.find(x => x.id === curPropId);
      if (!p) return;
      p.name = name; p.type = type; p.address = address;
      save(props);
      document.getElementById("propTitle").textContent = p.name;
      document.getElementById("propMeta").textContent = [p.type, p.address].filter(Boolean).join(" · ") || "";
      document.getElementById("editPropForm").hidden = true;
      renderProps();
    });

    // ── 호실 그리드 ──
    function renderRoomGrid(p) {
      const el = document.getElementById("roomGrid");
      if (!el) return;
      const rooms = p.rooms || [];
      if (rooms.length === 0) {
        el.innerHTML = `<p class="empty">호실이 없습니다.</p>`;
        return;
      }
      el.innerHTML = rooms.map(r => {
        const c = r.contract || {};
        const vacant = !c.ctype || c.ctype === "공실" || c.ctype === "";
        return `
          <div class="room-card ${vacant ? "vacant" : "occupied"}" data-rid="${esc(r.id)}">
            <div class="room-number">${esc(r.name)}</div>
            <div class="room-status">${esc(c.ctype || "미설정")}</div>
            <div class="room-tenant">${esc(c.tenant || "-")}</div>
            <div class="room-monthly">${c.monthly ? toAccounting(c.monthly) : "-"}</div>
          </div>`;
      }).join("");
      el.querySelectorAll("[data-rid]").forEach(card => {
        card.addEventListener("click", () => openRoom(card.dataset.rid));
      });
    }

    // ── 수익 요약 ──
    function renderReport(p) {
      const el = document.getElementById("reportBox");
      if (!el) return;
      const rooms    = p.rooms || [];
      const occupied = rooms.filter(r => r.contract?.ctype && r.contract.ctype !== "공실" && r.contract.ctype !== "");
      let totalMonthly = 0;
      occupied.forEach(r => {
        const n = parseMoneyVal(r.contract?.monthly || "");
        if (!isNaN(n)) totalMonthly += n;
      });
      el.innerHTML = `<div class="report-row">
        <span class="report-item"><span class="report-label">전체</span><span class="report-value">${rooms.length}실</span></span>
        <span class="report-item"><span class="report-label">입주</span><span class="report-value">${occupied.length}실</span></span>
        <span class="report-item"><span class="report-label">공실</span><span class="report-value">${rooms.length - occupied.length}실</span></span>
        ${totalMonthly > 0 ? `<span class="report-item"><span class="report-label">월세합계</span><span class="report-value">${totalMonthly.toLocaleString()}원</span></span>` : ""}
      </div>`;
    }

    function parseMoneyVal(s) {
      if (!s) return NaN;
      const clean = String(s).replace(/\s/g, "");
      // 구형식 호환: "500만원", "45만원" 등
      const mMan = clean.replace(/,/g,"").match(/(\d+\.?\d*)\s*만원?/);
      if (mMan) return parseFloat(mMan[1]) * 10000;
      // 신형식: 3,000,000원 또는 3000000
      const noUnit = clean.replace(/[,원]/g, "");
      const m = noUnit.match(/^[\d.]+/);
      return m ? parseFloat(m[0]) : NaN;
    }

    // ── 호실 상세 ──
    function openRoom(roomId) {
      curRoomId = roomId;
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === roomId);
      if (!room) return;
      document.getElementById("roomDetailTitle").textContent = `${p.name} ${room.name}`;
      showView("roomDetail");
      switchRoomTab("contract");
    }

    function switchRoomTab(tab) {
      document.querySelectorAll("#roomTabNav .sub-tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      ["contract","payment","memo"].forEach(t => {
        document.getElementById(`rTab-${t}`).hidden = t !== tab;
      });
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room) return;
      if (tab === "contract") fillContract(room);
      if (tab === "payment")  renderPayments(room);
      if (tab === "memo")     renderRoomMemos(room);
    }

    // ── 임대료 변동 이력 ──
    function renderRentHistory(room) {
      const el = document.getElementById("rentHistoryList");
      if (!el) return;
      const history = room.contract?.rentHistory || [];
      if (history.length === 0) {
        el.innerHTML = `<p style="font-size:.82rem;color:var(--text-light);margin:.2rem 0">변동 이력이 없습니다.</p>`;
        return;
      }
      el.innerHTML = history.slice().sort((a,b) => b.date.localeCompare(a.date)).map(h => `
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:.4rem .6rem;padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.85rem">
          <span style="color:var(--text-light);flex-shrink:0">${esc(h.date)}</span>
          <span style="font-weight:600;color:var(--brand-strong)">${esc(h.monthly)}</span>
          ${h.note ? `<span style="color:var(--text-light)">${esc(h.note)}</span>` : ""}
          <button type="button" class="mini-button rh-del" data-id="${esc(h.id)}" style="margin-left:auto">삭제</button>
        </div>`).join("");
      el.querySelectorAll(".rh-del").forEach(btn => {
        btn.addEventListener("click", () => {
          const p = props.find(x => x.id === curPropId);
          const r = p?.rooms?.find(r => r.id === curRoomId);
          if (!r || !confirm("이 변동 이력을 삭제할까요?")) return;
          r.contract.rentHistory = r.contract.rentHistory.filter(x => x.id !== btn.dataset.id);
          save(props);
          renderRentHistory(r);
        });
      });
    }

    function fillContract(room) {
      const c = room.contract || {};
      document.getElementById("rc-ctype").value   = c.ctype   || "";
      document.getElementById("rc-tenant").value  = c.tenant  || "";
      document.getElementById("rc-deposit").value = c.deposit || "";
      document.getElementById("rc-monthly").value = c.monthly || "";
      document.getElementById("rc-dueday").value  = c.dueday  || "";
      document.getElementById("rc-start").value   = c.start   || "";
      document.getElementById("rc-end").value     = c.end     || "";
      document.getElementById("rc-note").value    = c.note    || "";
      // 계약종료 상태 표시
      const badge   = document.getElementById("contractTerminatedBadge");
      const termBtn = document.getElementById("btnTerminateContract");
      if (c.terminated) {
        badge.hidden = false;
        document.getElementById("contractTerminatedDate").textContent = c.terminatedAt || "";
        if (termBtn) termBtn.hidden = true;
      } else {
        badge.hidden = true;
        if (termBtn) termBtn.hidden = false;
      }
      renderRentHistory(room);
    }

    // ── 납부내역: 실제 납부일 기록 + 시작일~오늘 기준 미납 자동 표시 ──
    function renderPayments(room) {
      const listEl    = document.getElementById("paymentList");
      const summaryEl = document.getElementById("paymentSummary");
      if (!listEl) return;

      const c        = room.contract || {};
      const monthly  = parseMoneyVal(c.monthly || "");
      const payments = room.payments || [];

      // 시작일 ~ 오늘 (계약종료 버튼 누른 경우 종료일 기준)
      const months     = genMonthList(c.start, c.terminated ? c.terminatedAt : null);
      const unpaidCount = months.filter(m => !payments.some(p => p.date?.slice(0,7) === m)).length;
      const paidCount   = months.length - unpaidCount;
      const unpaidTotal = isNaN(monthly) ? null : unpaidCount * monthly;

      // 요약
      if (summaryEl) {
        if (months.length === 0 && payments.length === 0) {
          summaryEl.innerHTML = `<div style="font-size:.85rem;color:var(--text-light)">계약정보 탭에서 계약 시작일을 입력하면 납부 현황이 자동으로 표시됩니다.</div>`;
        } else if (months.length === 0) {
          summaryEl.innerHTML = `<div class="report-row"><span class="report-item"><span class="report-label">납부 기록</span><span class="report-value">${payments.length}회</span></span></div>`;
        } else {
          summaryEl.innerHTML = `<div class="report-row">
            <span class="report-item"><span class="report-label">전체</span><span class="report-value">${months.length}개월</span></span>
            <span class="report-item"><span class="report-label">납부</span><span class="report-value">${paidCount}회</span></span>
            <span class="report-item"><span class="report-label" style="color:#ef4444">미납</span><span class="report-value" style="color:#ef4444">${unpaidCount}개월</span></span>
            ${unpaidTotal !== null && unpaidTotal > 0 ? `<span class="report-item"><span class="report-label" style="color:#ef4444">미납금</span><span class="report-value" style="color:#ef4444">${unpaidTotal.toLocaleString()}원</span></span>` : ""}
          </div>`;
        }
      }

      // 합산 리스트: 월별 납부/미납 (최신순)
      let html = "";
      months.slice().reverse().forEach(ym => {
        const label = `${ym.slice(0,4)}년 ${Number(ym.slice(5))}월`;
        const paid  = payments.find(p => p.date?.slice(0,7) === ym);
        if (paid) {
          html += `<div class="payment-item payment-paid">
            <div class="payment-main">
              <div class="payment-month">${esc(label)}</div>
              <div class="payment-amount">납부일: ${esc(paid.date)}${paid.note ? ` · ${esc(paid.note)}` : ""}</div>
            </div>
            <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
              <span class="payment-badge payment-paid">납부완료</span>
              <button type="button" class="mini-button pay-del" data-pid="${esc(paid.id)}">삭제</button>
            </div>
          </div>`;
        } else {
          const amt = isNaN(monthly) ? "" : ` · ${monthly.toLocaleString()}원`;
          html += `<div class="payment-item payment-unpaid">
            <div class="payment-main">
              <div class="payment-month" style="color:#ef4444">${esc(label)}</div>
              ${amt ? `<div class="payment-amount" style="color:#ef4444">미납${amt}</div>` : ""}
            </div>
            <span class="payment-badge payment-unpaid">미납</span>
          </div>`;
        }
      });

      // 계약기간 외 납부 기록
      const orphaned = payments.filter(p => p.date && !months.includes(p.date.slice(0,7)));
      if (orphaned.length > 0) {
        html += `<div style="margin:.6rem 0 .3rem;font-size:.78rem;color:var(--text-light);text-align:center">─ 기간 외 납부 기록 ─</div>`;
        orphaned.slice().sort((a,b) => b.date.localeCompare(a.date)).forEach(pay => {
          html += `<div class="payment-item payment-paid">
            <div class="payment-main">
              <div class="payment-month">${esc(pay.date)}</div>
              ${pay.note ? `<div class="payment-amount">${esc(pay.note)}</div>` : ""}
            </div>
            <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
              <span class="payment-badge payment-paid">납부완료</span>
              <button type="button" class="mini-button pay-del" data-pid="${esc(pay.id)}">삭제</button>
            </div>
          </div>`;
        });
      }

      listEl.innerHTML = html || `<p class="empty">계약 시작일이 없거나 납부 기록이 없습니다.</p>`;

      // 토글 상태 초기화 (탭 진입 시 닫힘)
      const toggleBtn = document.getElementById("btnTogglePaymentList");
      if (toggleBtn) {
        listEl.hidden = true;
        toggleBtn.textContent = "납부 목록 펼치기 ▼";
      }

      listEl.querySelectorAll(".pay-del").forEach(btn => {
        btn.addEventListener("click", () => {
          const p = props.find(x => x.id === curPropId);
          const r = p?.rooms?.find(r => r.id === curRoomId);
          if (!r || !confirm("납부 기록을 삭제할까요?")) return;
          r.payments = r.payments.filter(x => x.id !== btn.dataset.pid);
          save(props);
          renderPayments(r);
        });
      });
    }

    function renderRoomMemos(room) {
      const el = document.getElementById("roomMemoList");
      if (!el) return;
      const memos = room.memos || [];
      if (memos.length === 0) {
        el.innerHTML = `<p class="empty">메모가 없습니다.</p>`;
        return;
      }
      el.innerHTML = memos.slice().reverse().map((m, ri) => {
        const realIdx = memos.length - 1 - ri;
        return `<div style="padding:.4rem .25rem;display:flex;align-items:flex-start;gap:.5rem">
          <div style="flex:1">
            <div style="font-size:.75rem;color:var(--text-light)">${esc(m.date)}</div>
            <div style="font-size:.9rem;line-height:1.6;word-break:break-all">${esc(m.content).replace(/\n/g,"<br>")}</div>
          </div>
          <button type="button" class="mini-button memo-del" data-idx="${realIdx}">삭제</button>
        </div>`;
      }).join("");
      el.querySelectorAll(".memo-del").forEach(btn => {
        btn.addEventListener("click", () => {
          const p = props.find(x => x.id === curPropId);
          const r = p?.rooms?.find(r => r.id === curRoomId);
          if (!r || !confirm("삭제할까요?")) return;
          r.memos.splice(Number(btn.dataset.idx), 1);
          save(props);
          renderRoomMemos(r);
        });
      });
    }

    // ── 이벤트 ──
    document.getElementById("btnShowAddProp").addEventListener("click", () => {
      const f = document.getElementById("addPropForm");
      f.hidden = !f.hidden;
      if (!f.hidden) document.getElementById("newPropName").focus();
    });
    document.getElementById("btnCancelProp").addEventListener("click", () => {
      document.getElementById("addPropForm").hidden = true;
      ["newPropName","newPropAddress"].forEach(id => document.getElementById(id).value = "");
    });
    document.getElementById("btnSaveProp").addEventListener("click", () => {
      const name    = document.getElementById("newPropName").value.trim();
      const type    = document.getElementById("newPropType").value;
      const address = document.getElementById("newPropAddress").value.trim();
      if (!name) { alert("물건명을 입력하세요."); return; }
      props.push({ id: String(Date.now()), name, type, address, rooms: [], createdAt: nowStr() });
      save(props);
      ["newPropName","newPropAddress"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("newPropType").value = "";
      document.getElementById("addPropForm").hidden = true;
      renderProps();
    });
    document.getElementById("newPropName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btnSaveProp").click();
    });

    document.getElementById("btnBackToProps").addEventListener("click", () => {
      showView("props"); curPropId = null; renderProps();
    });
    document.getElementById("btnDelProp").addEventListener("click", () => {
      const p = props.find(x => x.id === curPropId);
      if (!p || !confirm(`"${p.name}" 물건을 삭제할까요?\n모든 호실 데이터가 삭제됩니다.`)) return;
      props = props.filter(x => x.id !== curPropId);
      save(props);
      document.getElementById("btnBackToProps").click();
    });

    document.getElementById("btnBackToRooms").addEventListener("click", () => {
      const p = props.find(x => x.id === curPropId);
      if (p) { renderRoomGrid(p); renderReport(p); }
      showView("rooms"); curRoomId = null;
    });
    document.getElementById("btnDelRoom").addEventListener("click", () => {
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room || !confirm(`"${room.name}" 호실을 삭제할까요?`)) return;
      p.rooms = p.rooms.filter(r => r.id !== curRoomId);
      save(props);
      document.getElementById("btnBackToRooms").click();
    });

    document.getElementById("roomTabNav").addEventListener("click", e => {
      const tab = e.target.closest(".sub-tab")?.dataset.tab;
      if (tab) switchRoomTab(tab);
    });

    document.getElementById("btnSaveContract").addEventListener("click", () => {
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room) return;
      const prev = room.contract || {};
      room.contract = {
        terminated:   prev.terminated,
        terminatedAt: prev.terminatedAt,
        rentHistory:  prev.rentHistory,
        ctype:   document.getElementById("rc-ctype").value,
        tenant:  document.getElementById("rc-tenant").value.trim(),
        deposit: document.getElementById("rc-deposit").value.trim(),
        monthly: document.getElementById("rc-monthly").value.trim(),
        dueday:  document.getElementById("rc-dueday").value.trim(),
        start:   document.getElementById("rc-start").value,
        end:     document.getElementById("rc-end").value,
        note:    document.getElementById("rc-note").value.trim(),
      };
      save(props);
      alert("저장됐습니다.");
    });

    document.getElementById("btnTerminateContract").addEventListener("click", () => {
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room || !confirm("계약을 종료 처리하시겠습니까?\n납부 기간이 오늘 기준으로 마감됩니다.")) return;
      if (!room.contract) room.contract = {};
      const today = new Date();
      room.contract.terminated   = true;
      room.contract.terminatedAt = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
      room.contract.ctype = "공실";
      document.getElementById("rc-ctype").value = "공실";
      save(props);
      fillContract(room);
      renderRoomGrid(p);
      renderReport(p);
    });

    document.getElementById("btnUndoTerminate").addEventListener("click", () => {
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room || !confirm("계약 종료를 취소하시겠습니까?")) return;
      room.contract.terminated = false;
      delete room.contract.terminatedAt;
      save(props);
      fillContract(room);
      renderRoomGrid(p);
      renderReport(p);
    });

    // ── 호실 추가 ──
    document.getElementById("btnShowAddRoom").addEventListener("click", () => {
      const f = document.getElementById("addRoomForm");
      f.hidden = !f.hidden;
      if (!f.hidden) document.getElementById("newRoomName").focus();
    });
    document.getElementById("btnCancelRoom").addEventListener("click", () => {
      document.getElementById("addRoomForm").hidden = true;
      document.getElementById("newRoomName").value = "";
    });
    document.getElementById("btnSaveRoom").addEventListener("click", () => {
      const name = document.getElementById("newRoomName").value.trim();
      if (!name) { alert("호실명을 입력하세요."); return; }
      const p = props.find(x => x.id === curPropId);
      if (!p) return;
      if (!Array.isArray(p.rooms)) p.rooms = [];
      p.rooms.push({ id: String(Date.now()), name, contract: {}, payments: [], memos: [] });
      save(props);
      document.getElementById("newRoomName").value = "";
      document.getElementById("addRoomForm").hidden = true;
      renderRoomGrid(p);
      renderReport(p);
    });
    document.getElementById("newRoomName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btnSaveRoom").click();
    });

    // ── 임대료 변동 이력 추가 ──
    document.getElementById("btnAddRentHistory").addEventListener("click", () => {
      const date    = document.getElementById("rh-date").value;
      const monthly = document.getElementById("rh-monthly").value.trim();
      const note    = document.getElementById("rh-note").value.trim();
      if (!date || !monthly) { alert("변동일과 새 월세를 모두 입력하세요."); return; }
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room) return;
      if (!room.contract) room.contract = {};
      if (!Array.isArray(room.contract.rentHistory)) room.contract.rentHistory = [];
      room.contract.rentHistory.push({ id: String(Date.now()), date, monthly, note });
      save(props);
      document.getElementById("rh-date").value    = "";
      document.getElementById("rh-monthly").value = "";
      document.getElementById("rh-note").value    = "";
      renderRentHistory(room);
    });

    // ── 납부 목록 펼치기/닫기 ──
    document.getElementById("btnTogglePaymentList").addEventListener("click", () => {
      const listEl    = document.getElementById("paymentList");
      const toggleBtn = document.getElementById("btnTogglePaymentList");
      listEl.hidden = !listEl.hidden;
      toggleBtn.textContent = listEl.hidden ? "납부 목록 펼치기 ▼" : "납부 목록 닫기 ▲";
    });

    document.getElementById("btnAddPayment").addEventListener("click", () => {
      const date = document.getElementById("pay-date").value;
      const note = document.getElementById("pay-note").value.trim();
      if (!date) { alert("납부일을 선택해주세요."); return; }
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room) return;
      if (!Array.isArray(room.payments)) room.payments = [];
      room.payments.push({ id: String(Date.now()), date, note });
      save(props);
      document.getElementById("pay-date").value = "";
      document.getElementById("pay-note").value = "";
      renderPayments(room);
      renderReport(p);
    });

    document.getElementById("btnAddRoomMemo").addEventListener("click", () => {
      const content = document.getElementById("roomMemoInput").value.trim();
      if (!content) return;
      const p    = props.find(x => x.id === curPropId);
      const room = p?.rooms?.find(r => r.id === curRoomId);
      if (!room) return;
      if (!Array.isArray(room.memos)) room.memos = [];
      room.memos.push({ date: nowStr(), content });
      save(props);
      document.getElementById("roomMemoInput").value = "";
      renderRoomMemos(room);
    });
    document.getElementById("roomMemoInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("btnAddRoomMemo").click(); }
    });

    // 금액 필드 자동 콤마
    ["rc-deposit","rc-monthly","rh-monthly"].forEach(id => {
      const el = document.getElementById(id);
      if (el) addCommaInput(el);
    });

    renderProps();
  })();
  </script>
</body>
</html>
