<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f2937" />
  <title>개인카드 PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-copy">
        <h1>개인카드</h1>
        <p class="topbar-copy">인적사항과 상담내역을 함께 관리하는 개인카드</p>
      </div>

      <section class="panel data-panel">
        <h2>데이터 관리</h2>
        <div class="backup-actions">
          <button type="button" id="exportButton">백업</button>
          <label class="field-label" for="importMode">가져오기 방식</label>
          <select id="importMode">
            <option value="merge">병합</option>
            <option value="replace">덮어쓰기</option>
          </select>
          <input type="file" id="importFile" accept=".json,application/json" hidden />
          <button type="button" id="importButton">불러오기</button>
        </div>
      </section>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-header">
          <h2>고객 목록</h2>
          <div class="list-toolbar">
            <span class="panel-count" id="personCount"></span>
            <button type="button" id="toggleDeleteModeButton" class="secondary-button toolbar-button">선택삭제</button>
            <button type="button" id="deleteSelectedButton" class="danger-button toolbar-button" hidden>삭제 실행 (0)</button>
            <button type="button" id="toggleFormButton" class="primary-action toolbar-button">고객추가</button>
          </div>
        </div>
        <div id="personList" class="person-list"></div>
      </section>

      <section class="panel" id="detailPanel" hidden>
        <h2>상세 보기</h2>
        <div id="detailContent"></div>
      </section>

      <section class="panel" id="formPanel" hidden>
        <h2>고객 추가</h2>
        <form id="personForm" lang="ko">
          <div class="section-title">인적사항</div>
          <div class="inline-fields">
            <input type="text" id="name" placeholder="이름" required lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
            <select id="gender" lang="ko">
              <option value="">성별 선택</option>
              <option value="남">남</option>
              <option value="여">여</option>
            </select>
          </div>
          <input type="text" id="phone" inputmode="numeric" placeholder="전화번호" />
          <input type="email" id="email" placeholder="메일주소" autocapitalize="off" autocorrect="off" spellcheck="false" />
          <input type="text" id="address" placeholder="주소" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
          <input type="text" id="birthDate" maxlength="6" inputmode="numeric" placeholder="생년월일 6자리 예: 821003" />
          <div class="preview-text" id="birthPreview"></div>
          <input type="text" id="age" placeholder="한국식 나이 자동계산" readonly />
          <input type="text" id="job" placeholder="직업" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />
          <input type="text" id="tags" placeholder="태그(쉼표로 구분)" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false" />

          <div class="section-title">상담내역</div>
          <input type="text" id="firstConsultDate" maxlength="6" inputmode="numeric" placeholder="상담일자 6자리 예: 260320" />
          <div class="preview-text" id="consultDatePreview"></div>
          <textarea id="firstNote" placeholder="상담내용" lang="ko" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>

          <div class="form-actions">
            <button type="submit">저장</button>
            <button type="button" id="cancelFormButton" class="secondary-button">취소</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
