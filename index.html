<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f2937" />
  <title>개인카드 PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>개인카드</h1>
      <p class="topbar-copy">로컬에 안전하게 저장하는 개인 연락처 카드</p>
    </header>

    <main class="container">
      <section class="panel">
        <h2>데이터 관리</h2>
        <div class="backup-actions">
          <button type="button" id="exportButton">JSON 백업 다운로드</button>

          <label class="field-label" for="importMode">가져오기 방식</label>
          <select id="importMode">
            <option value="merge">기존 데이터와 병합</option>
            <option value="replace">기존 데이터를 지우고 덮어쓰기</option>
          </select>

          <input type="file" id="importFile" accept=".json,application/json" hidden />
          <button type="button" id="importButton">JSON 불러오기</button>
          <p class="help-text">주의: localStorage는 기기별로 따로 저장되므로 정기 백업을 권장합니다.</p>
        </div>
      </section>

      <section class="panel">
        <h2>사람 추가</h2>
        <form id="personForm">
          <input type="text" id="name" placeholder="이름" required />
          <input type="text" id="phone" placeholder="전화번호" />
          <input type="text" id="tags" placeholder="태그(쉼표로 구분)" />
          <textarea id="firstNote" placeholder="첫 기록"></textarea>
          <button type="submit">저장</button>
        </form>
      </section>

      <section class="panel">
        <h2>사람 목록</h2>
        <div id="personList" class="person-list"></div>
      </section>

      <section class="panel" id="detailPanel" hidden>
        <h2>상세 보기</h2>
        <div id="detailContent"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
