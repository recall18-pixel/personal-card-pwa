<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인카드 PWA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>개인카드</h1>
    </header>

    <main class="container">
      <section class="panel">
        <h2>데이터 관리</h2>
        <button onclick="exportData()">JSON 백업 다운로드</button>
        <input type="file" id="importFile" accept=".json" style="display:none" />
        <button onclick="document.getElementById('importFile').click()">
          JSON 불러오기
        </button>
      </section>
      <section class="panel">
        <h2>사람 추가</h2>
        <form id="personForm">
          <input type="text" id="name" placeholder="이름" required />
          <input type="text" id="phone" placeholder="전화번호" />
          <input type="text" id="tags" placeholder="태그(쉼표로 구분)" />
          <textarea id="firstNote" placeholder="첫 기록"></textarea>
          <button type="submit">저장</button>
        </form>
      </section>

      <section class="panel">
        <h2>사람 목록</h2>
        <div id="personList" class="person-list"></div>
      </section>

      <section class="panel" id="detailPanel" style="display:none;">
        <h2>상세 보기</h2>
        <div id="detailContent"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
